name: Publish to npm

on:
  push:
    tags:
      - 'v*'

env:
  # Run JavaScript-based actions (checkout, setup-node, etc.) on Node 24 instead
  # of the deprecated Node 20 runner. Becomes the default on 2026-06-02 and is
  # required from 2026-09-16 when Node 20 is removed from runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to support OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
